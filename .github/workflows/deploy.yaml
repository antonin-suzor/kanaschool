name: Release and Deploy

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Bump package.json version to match tag
        run: |
          jq --arg v ${GITHUB_REF_NAME#v} '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build project
        run: bun run build

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Bump app version to ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Run migrations and deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_DEPLOY_KANASCHOOL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          bunx wrangler d1 migrations apply D1_DB --remote
          bunx wrangler deploy --var DISCORD_WEBHOOK_URL:$DISCORD_WEBHOOK_URL

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
